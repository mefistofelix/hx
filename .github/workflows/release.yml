name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build release binaries
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/hx
            bin/hx.exe
          generate_release_notes: true
