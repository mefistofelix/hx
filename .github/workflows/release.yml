name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh repo clone "$GITHUB_REPOSITORY" repo -- --depth=1
          cd repo
          if [ -n "${GITHUB_REF_NAME:-}" ]; then
            git fetch --depth=1 origin "$GITHUB_REF_NAME" || true
            git checkout "$GITHUB_REF_NAME" || true
          fi

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          cd repo
          bash ./test.sh

      - name: Build Linux
        shell: bash
        run: |
          set -euo pipefail
          cd repo
          bash ./build.sh

      - name: Package Linux artifact
        shell: bash
        env:
          ARCHIVE_NAME: hx-linux-amd64.tar.gz
        run: |
          set -euo pipefail
          cd repo
          tar -czf "$ARCHIVE_NAME" -C bin hx

      - name: Build Windows
        shell: bash
        run: |
          set -euo pipefail
          cd repo
          TARGET_OS=windows TARGET_ARCH=amd64 TARGET_BIN_PATH="$PWD/bin/hx.exe" bash ./build.sh

      - name: Package Windows artifact
        shell: bash
        env:
          ARCHIVE_NAME: hx-windows-amd64.zip
        run: |
          set -euo pipefail
          cd repo
          python3 - <<'PY'
from pathlib import Path
import zipfile
archive = Path("hx-windows-amd64.zip")
binary = Path("bin/hx.exe")
with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED) as zf:
    zf.write(binary, "hx.exe")
PY

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd repo
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes ""
          gh release upload "$GITHUB_REF_NAME" "hx-linux-amd64.tar.gz" "hx-windows-amd64.zip" --clobber
